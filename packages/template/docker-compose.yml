services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: vobase
      POSTGRES_PASSWORD: vobase
      POSTGRES_DB: vobase
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vobase']
      interval: 5s
      timeout: 3s
      retries: 5

  maildev:
    image: maildev/maildev
    ports:
      - '1080:1080' # Web UI
      - '1025:1025' # SMTP
    environment:
      MAILDEV_WEB_PORT: 1080
      MAILDEV_SMTP_PORT: 1025

volumes:
  pgdata:
