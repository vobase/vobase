services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: vobase
      POSTGRES_PASSWORD: vobase
      POSTGRES_DB: vobase
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vobase']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
