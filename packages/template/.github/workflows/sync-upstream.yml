name: Sync Upstream Template

on:
  workflow_dispatch:

concurrency:
  group: sync-upstream
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Pull upstream changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream template
        run: |
          git remote add upstream https://github.com/vobase/template.git || true
          git fetch upstream main

      - name: Check for changes
        id: diff
        run: |
          CHANGES=$(git diff HEAD upstream/main --stat)
          if [ -z "$CHANGES" ]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes to sync."
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "$CHANGES"
          fi

      - name: Create sync branch and PR
        if: steps.diff.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git merge upstream/main --allow-unrelated-histories --no-edit || true

          # Restore local workflow files (GITHUB_TOKEN can't push workflow changes)
          git checkout HEAD -- .github/workflows/ 2>/dev/null || true

          # Check for remaining conflicts
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "::warning::Merge conflicts detected — resolve manually after PR is created."
            git add -A
            git commit --no-edit -m "sync: merge upstream template (conflicts present)"
          else
            git add -A
            CHANGES=$(git diff --cached --stat)
            if [ -n "$CHANGES" ]; then
              git commit --no-edit -m "sync: merge upstream template"
            fi
          fi

          git push origin "$BRANCH"

          gh pr create \
            --head "$BRANCH" \
            --title "sync: update from upstream template" \
            --body "$(cat <<'EOF'
          ## Upstream Template Sync

          This PR merges the latest changes from [vobase/template](https://github.com/vobase/template).

          **Review carefully** — upstream changes may conflict with local customizations.

          If there are merge conflicts, resolve them before merging.
          EOF
          )"
