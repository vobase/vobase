name: template-v2 PR-2 CI

on:
  push:
    branches:
      - integration/template-v2-pr2
  pull_request:
    branches:
      - main
    paths:
      - 'packages/template-v2/**'

defaults:
  run:
    working-directory: packages/template-v2

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  check-tokens:
    name: Token gates (both palettes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check:tokens

  check-no-raw-date:
    name: No raw date formatters (PR diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check:no-raw-date

  check-shape:
    name: Module shape lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check:shape

  check-bundle:
    name: Frontend bundle safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check:bundle

  theme-provider-test:
    name: Theme-provider tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test src/__tests__/theme-provider.test.ts

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: vobase
          POSTGRES_PASSWORD: vobase
          POSTGRES_DB: vobase_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5433:5432
    env:
      DATABASE_URL: postgresql://vobase:vobase@localhost:5433/vobase_test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run db:reset
      - run: bun test tests/phase1-green-thread.test.ts
      - run: bun run db:reset
      - run: bun test tests/phase2-dogfood.test.ts modules/ server/

  smoke-staff-reply:
    name: Smoke — POST /reply (σ5 gate)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'pull_request'
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: vobase
          POSTGRES_PASSWORD: vobase
          POSTGRES_DB: vobase_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5433:5432
    env:
      DATABASE_URL: postgresql://vobase:vobase@localhost:5433/vobase_test
      BASE_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run db:reset
      - name: Start dev server
        run: bun run dev:server &
        shell: bash
      - name: Wait for server ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3001/health && break || sleep 1
          done
      - run: bun run smoke:staff-reply
