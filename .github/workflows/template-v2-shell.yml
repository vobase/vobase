name: template-v2-shell

on:
  push:
    branches: [main, integration/template-v2-pr1]
    paths:
      - 'packages/template-v2/**'
      - '.github/workflows/template-v2-shell.yml'
  pull_request:
    paths:
      - 'packages/template-v2/**'
      - '.github/workflows/template-v2-shell.yml'

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: packages/template-v2

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Lint (biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test (shell unit tests)
        run: bun test src/__tests__/

      - name: check:tokens
        run: bun run check:tokens

      - name: check:dead-routes
        run: bun run check:dead-routes

      - name: check:shadcn-overrides
        run: bun run check:shadcn-overrides

      - name: check:no-auto-nav-tabs
        run: bun run check:no-auto-nav-tabs

      - name: check:no-stub-flag
        run: bun run check:no-stub-flag

      - name: check:bundle
        run: bun run check:bundle

      - name: check:shape
        run: bun run check:shape

  smoke:
    if: github.ref == 'refs/heads/integration/template-v2-pr1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: gates

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: vobase
          POSTGRES_PASSWORD: vobase
          POSTGRES_DB: vobase_v2
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U vobase -d vobase_v2"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://vobase:vobase@localhost:5433/vobase_v2
      TEMPLATE_V2_DATABASE_URL: postgres://vobase:vobase@localhost:5433/vobase_v2
      PORT: "3001"
      BASE_URL: http://localhost:3001
      TENANT_ID: tenant_meridian

    defaults:
      run:
        working-directory: packages/template-v2

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: DB reset (seed)
        run: bun run db:reset

      - name: Start server
        run: bun run dev:server &

      - name: Wait for server ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3001/health && break || sleep 1
          done

      - name: Smoke inbox mutations
        run: bun run scripts/smoke-inbox-mutations.ts
