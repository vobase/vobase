name: Sync Template

on:
  push:
    branches: [main]
    paths:
      - "packages/template/**"
      - "packages/create-vobase/**"
      - ".agents/skills/**"
      - ".github/workflows/sync-template.yml"
  workflow_dispatch:

concurrency:
  group: sync-template
  cancel-in-progress: true

jobs:
  sync:
    name: Sync to vobase/template
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Generate a short-lived token from the Vobase GitHub App
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 3131401
          private-key: ${{ secrets.VOBASE_APP_PRIVATE_KEY }}
          owner: vobase
          repositories: template

      # Build core first (template depends on @vobase/core)
      - run: bun install --frozen-lockfile
      - run: bun run build

      # Scaffold into a temp directory using create-vobase CLI (local copy mode)
      - name: Scaffold template
        run: |
          set -euo pipefail
          OUT="${RUNNER_TEMP}/template-out"
          bun run packages/create-vobase/index.ts "$OUT" --template

          # Generate initial drizzle migration (for db:migrate on first boot)
          cd "$OUT"
          mkdir -p data
          bun run db:push
          bun run db:generate

      - name: Add deployment files
        run: |
          set -euo pipefail
          OUT="${RUNNER_TEMP}/template-out"

          # Dockerfile for Railway
          cat > "$OUT/Dockerfile" << 'EOF'
          FROM oven/bun:1.3.10-slim AS base
          WORKDIR /app

          # Install all deps (including devDeps for Vite build)
          FROM base AS build
          COPY package.json bun.lock* ./
          COPY patches/ ./patches/
          RUN bun install --frozen-lockfile
          COPY . .
          RUN bun run build

          # Production deps only
          FROM base AS prod-deps
          COPY package.json bun.lock* ./
          COPY patches/ ./patches/
          RUN bun install --frozen-lockfile --production

          # Final image
          FROM base
          COPY --from=prod-deps /app/node_modules ./node_modules
          COPY --from=build /app/dist ./dist
          COPY . .
          EXPOSE 3000
          CMD ["bun", "run", "server.ts"]
          EOF

          # railway.json for deploy config
          cat > "$OUT/railway.json" << 'EOF'
          {
            "$schema": "https://railway.com/railway.schema.json",
            "build": {
              "dockerfilePath": "Dockerfile"
            },
            "deploy": {
              "startCommand": "bun run server.ts",
              "restartPolicyType": "ON_FAILURE",
              "restartPolicyMaxRetries": 10
            }
          }
          EOF

          # Append platform env vars to .env.example
          cat >> "$OUT/.env.example" << 'EOF'

          # --- Platform Integration (set by provisioning) ---
          # PLATFORM_HMAC_SECRET=
          # PLATFORM_URL=
          # BIFROST_API_KEY=
          EOF

          # Clean up dev-only artifacts
          rm -rf "$OUT/data/" "$OUT/.env" "$OUT/node_modules/" "$OUT/.tanstack/"

      # Push to vobase/template repo using GitHub App token
      - name: Push to vobase/template
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          OUT="${RUNNER_TEMP}/template-out"
          cd "$OUT"

          # Configure git with app token for HTTPS push
          git init -b main
          git config user.name "vobase[bot]"
          git config user.email "3131401+vobase[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/vobase/template.git"

          # Commit and force-push
          git add -A
          SHORT_SHA="${COMMIT_SHA:0:8}"
          git commit -m "sync: update from vobase/vobase@${SHORT_SHA}"
          git push --force origin main
