name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: bun run lint

      - run: bun run typecheck

      - name: Run tests (published packages only)
        run: |
          # Release is gated on the packages we actually publish
          # (@vobase/core, create-vobase). Template packages are private and
          # have their own workflow (template-v2.yml) that provisions the
          # Postgres service their integration tests need — running them here
          # would fail on ECONNREFUSED to port 5433.
          #
          # PGlite WASM keeps handles alive, causing bun test to exit 99
          # even when all tests pass. Capture output to check for real failures.
          output=$(bunx turbo run test \
            --filter='@vobase/core' \
            --filter='create-vobase' \
            --force 2>&1) || true
          echo "$output"
          if echo "$output" | grep -qE '^\s+[1-9][0-9]* fail'; then
            echo "::error::Tests failed"
            exit 1
          fi

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
