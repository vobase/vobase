name: template-v2 nightly (live API)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: vobase
          POSTGRES_PASSWORD: vobase
          POSTGRES_DB: vobase_v2
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U vobase -d vobase_v2"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://vobase:vobase@localhost:5433/vobase_v2
      TEMPLATE_V2_DATABASE_URL: postgres://vobase:vobase@localhost:5433/vobase_v2
      USE_RECORDED_FIXTURES: 'false'
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    defaults:
      run:
        working-directory: packages/template-v2

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: bun run typecheck

      - name: DB reset (C1 — phase1 baseline)
        run: bun run db:reset

      - name: Test phase1 (green-thread integration)
        run: bun test tests/phase1-green-thread.test.ts

      - name: DB reset (C2 — phase2 clean slate)
        run: bun run db:reset

      - name: Test phase2 + unit (live Anthropic API)
        run: bun test tests/phase2-dogfood.test.ts modules/ server/

      - name: Open failure issue on first red night
        if: failure()
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const runUrl = process.env.RUN_URL
            const title = 'Nightly live-API test failure'
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nightly-failure',
            })
            const existing = issues.find(i => i.title === title)
            if (existing) {
              // Second consecutive failure — add PR-blocking label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                labels: ['block-merge'],
              })
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Second consecutive red night. PRs are now blocked until nightly is green again.\n\nFailing run: ${runUrl}`,
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `Nightly live-API test suite failed.\n\nFailing run: ${runUrl}\n\nResolve and close this issue once green.`,
                labels: ['nightly-failure'],
              })
            }

      - name: Close failure issue on green night
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Nightly live-API test failure'
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nightly-failure',
            })
            const existing = issues.find(i => i.title === title)
            if (existing) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                name: 'block-merge',
              }).catch(() => undefined)
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              })
            }
